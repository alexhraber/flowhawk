name: Decapod Validate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Decapod
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/decapod
          key: ${{ runner.os }}-decapod
      - name: Install Decapod
        run: |
          if ! command -v decapod &> /dev/null; then
            cargo install decapod
          fi
      - name: Decapod Validate
        env:
          DECAPOD_VALIDATE_SKIP_GIT_GATES: 1
        run: |
          decapod init --proof
          TASK_ID=$(decapod todo add "CI validation" --format json 2>/dev/null | sed -n 's/.*"id": *"\([^"]*\)".*/\1/p')
          decapod todo claim --id $TASK_ID
          WORKSPACE_OUTPUT=$(decapod workspace ensure 2>&1)
          WORKSPACE_DIR=$(echo "$WORKSPACE_OUTPUT" | sed -n 's/.*"worktree_path": *"\([^"]*\)".*/\1/p')
          cd "$WORKSPACE_DIR"
          decapod validate --refresh-specs
